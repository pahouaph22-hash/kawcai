<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>รายละเอียดการแข่งขัน — วัวชนไทย</title>
<link href="https://fonts.googleapis.com/css2?family=Phetsarath:wght@400;700&family=Noto+Sans+Lao:wght@400;700;900&family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#F5C842; --green:#22c55e; --green2:#16a34a;
  --red:#C8102E; --blue:#1e50c8;
  --bg:#0a1a0a; --card:#0f2010; --border:rgba(255,255,255,0.08);
  --text:#F0FFE8; --muted:rgba(240,255,232,0.45);
}
html{background:var(--bg);color:var(--text);}
body{font-family:'Phetsarath','Noto Sans Lao','Kanit',sans-serif;min-height:100vh;background:var(--bg);}
a{text-decoration:none;}
input,button{font-family:inherit;}
button{cursor:pointer;}

/* ── Nav ── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid rgba(245,200,66,0.15);
  position:sticky;top:0;z-index:100;
}
.nav-back{color:var(--muted);font-size:13px;font-weight:700;font-family:'Kanit',sans-serif;}
.nav-back:hover{color:var(--text);}
.nav-logo{font-family:'Kanit',sans-serif;font-weight:900;font-size:16px;color:var(--text);}
.nav-logo em{color:var(--gold);font-style:normal;}
.nav-user{font-size:12px;color:var(--muted);font-family:'Kanit',sans-serif;}

/* ── Page ── */
#page-content{max-width:640px;margin:0 auto;padding:0 0 40px;}

/* ── Match Hero ── */
.match-hero{
  text-align:center;padding:20px 16px 12px;
  border-bottom:1px solid var(--border);
}
.match-code{
  display:inline-block;background:var(--green2);color:#fff;
  font-family:'Kanit',sans-serif;font-weight:900;font-size:11px;
  padding:2px 10px;border-radius:999px;letter-spacing:.05em;margin-bottom:8px;
}
.match-round{font-family:'Kanit',sans-serif;font-weight:900;font-size:20px;margin-bottom:6px;}
.match-meta{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:8px;}
.match-meta span{display:flex;align-items:center;gap:4px;}
.status-badge{
  display:inline-block;font-family:'Kanit',sans-serif;font-weight:700;font-size:11px;
  padding:3px 12px;border-radius:999px;
}
.s-upcoming{background:rgba(245,200,66,0.12);color:var(--gold);border:1px solid rgba(245,200,66,0.3);}
.s-live{background:rgba(200,16,46,0.15);color:#ff7070;border:1px solid rgba(200,16,46,0.4);animation:pulse 1.5s infinite;}
.s-done{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Poster ── */
.match-poster{width:100%;padding:0 16px 8px;}
.match-poster img{width:100%;border-radius:10px;display:block;max-height:180px;object-fit:cover;box-shadow:0 4px 16px rgba(0,0,0,0.5);}

/* ── VS Arena ── */
.vs-arena{
  display:grid;grid-template-columns:1fr 56px 1fr;
  align-items:center;padding:20px 16px;
}
.bull-side{display:flex;flex-direction:column;align-items:center;gap:8px;}
.bull-ring{
  width:140px;height:140px;border-radius:50%;padding:4px;
}
.bull-ring.red-ring{
  background:linear-gradient(135deg,rgba(200,16,46,0.8),rgba(200,16,46,0.2));
  box-shadow:0 0 0 2px rgba(200,16,46,0.3),0 0 30px rgba(200,16,46,0.2);
}
.bull-ring.blue-ring{
  background:linear-gradient(135deg,rgba(30,80,200,0.8),rgba(30,80,200,0.2));
  box-shadow:0 0 0 2px rgba(30,80,200,0.3),0 0 30px rgba(30,80,200,0.2);
}
.bull-photo{
  width:100%;height:100%;border-radius:50%;
  overflow:hidden;background:rgba(0,0,0,0.3);
}
.bull-photo img{width:100%;height:100%;object-fit:cover;}
.bull-name{font-family:'Kanit',sans-serif;font-weight:900;font-size:17px;text-align:center;}
.bull-name.red{color:#ff7070;}
.bull-name.blue{color:#70a0ff;}
.bull-meta{font-size:11px;color:var(--muted);text-align:center;}
.bull-wt{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.06);border-radius:999px;
  padding:2px 8px;font-size:11px;color:var(--muted);font-family:'Kanit',sans-serif;
}

.vs-center{display:flex;flex-direction:column;align-items:center;gap:6px;}
.vs-circle{
  width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,200,66,0.18),rgba(245,200,66,0.03));
  border:2px solid rgba(245,200,66,0.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'Kanit',sans-serif;font-weight:900;font-size:13px;color:var(--gold);
}
.vs-prize{
  font-family:'Kanit',sans-serif;font-size:10px;font-weight:700;
  color:var(--gold);writing-mode:vertical-lr;opacity:.7;
  max-height:80px;overflow:hidden;
}

/* ── Winner banner ── */
.winner-banner{
  margin:0 16px 12px;border-radius:12px;padding:14px;
  background:linear-gradient(135deg,rgba(245,200,66,0.12),rgba(245,200,66,0.05));
  border:1px solid rgba(245,200,66,0.3);text-align:center;
}
.winner-label{font-size:11px;color:var(--gold);font-family:'Kanit',sans-serif;margin-bottom:4px;}
.winner-name{font-family:'Kanit',sans-serif;font-weight:900;font-size:20px;color:#fff;}

/* ── Bet Panel ── */
.bet-panel{
  margin:0 12px 12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
}
.bet-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.bet-panel-title{font-family:'Kanit',sans-serif;font-weight:700;font-size:14px;}

/* Arena ใน bet panel */
.bet-arena{
  display:grid;grid-template-columns:1fr 48px 1fr;
  align-items:start;padding:16px 12px;gap:8px;
}
.ba-col{display:flex;flex-direction:column;align-items:center;gap:8px;}
.ba-photo-wrap{
  width:90px;height:90px;border-radius:50%;padding:3px;
}
.ba-photo-wrap.red-w{
  background:linear-gradient(135deg,rgba(200,16,46,0.7),rgba(200,16,46,0.15));
  box-shadow:0 0 20px rgba(200,16,46,0.25);
}
.ba-photo-wrap.blue-w{
  background:linear-gradient(135deg,rgba(30,80,200,0.7),rgba(30,80,200,0.15));
  box-shadow:0 0 20px rgba(30,80,200,0.25);
}
.ba-photo-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:rgba(0,0,0,0.3);}
.ba-photo-inner img{width:100%;height:100%;object-fit:cover;}
.ba-bull-name{font-family:'Kanit',sans-serif;font-weight:900;font-size:14px;text-align:center;}
.ba-bull-name.r{color:#ff7070;}
.ba-bull-name.b{color:#70a0ff;}
.ba-owner{font-size:10px;color:var(--muted);margin-top:-4px;}

/* ปุ่ม ต่อ/รอง */
.ba-btns{display:flex;flex-direction:column;gap:5px;width:100%;}
.ba-btn{
  width:100%;padding:7px 6px;border-radius:9px;
  font-family:'Kanit',sans-serif;font-weight:700;font-size:11px;
  border:1.5px solid;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.2;
}
.ba-btn:hover{transform:translateY(-1px);filter:brightness(1.1);}
.ba-btn-tor{background:rgba(245,200,66,0.08);border-color:rgba(245,200,66,0.35);color:var(--gold);}
.ba-btn-rong{background:rgba(80,160,255,0.08);border-color:rgba(80,160,255,0.35);color:#80c8ff;}
.ba-btn-odds{display:block;font-size:16px;font-weight:900;margin-top:1px;}
.ba-btn-tor .ba-btn-odds{color:var(--gold);}
.ba-btn-rong .ba-btn-odds{color:#80c8ff;}

.ba-vs-col{display:flex;align-items:center;justify-content:center;padding-top:30px;}
.ba-vs-badge{
  width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,200,66,0.15),rgba(245,200,66,0.03));
  border:1.5px solid rgba(245,200,66,0.35);
  display:flex;align-items:center;justify-content:center;
  font-family:'Kanit',sans-serif;font-weight:900;font-size:11px;color:var(--gold);
}

/* ── Bets List ── */
.bets-panel{margin:0 12px 12px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.bets-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.bets-panel-title{font-family:'Kanit',sans-serif;font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;}
.bets-count{
  background:rgba(34,197,94,0.15);color:var(--green);
  border-radius:999px;padding:1px 8px;font-size:11px;font-family:'Kanit',sans-serif;font-weight:700;
}
.filter-tabs{display:flex;gap:4px;}
.filter-tab{
  padding:4px 10px;border-radius:999px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:'Kanit',sans-serif;font-size:10px;font-weight:700;cursor:pointer;
  transition:all .15s;
}
.filter-tab.active{background:rgba(34,197,94,0.15);border-color:var(--green);color:var(--green);}
#bets-list-area{padding:8px 12px 12px;display:flex;flex-direction:column;gap:6px;}

/* Bet Card */
.bet-card{
  border-radius:11px;border:1px solid var(--border);
  background:rgba(0,0,0,0.2);overflow:hidden;
}
.bet-card.side-red{border-left:3px solid rgba(200,16,46,0.6);}
.bet-card.side-blue{border-left:3px solid rgba(30,80,200,0.6);}
.bc-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px;}
.bc-left{display:flex;align-items:center;gap:6px;}
.bc-nick{font-family:'Kanit',sans-serif;font-weight:700;font-size:13px;}
.bc-side-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;font-family:'Kanit',sans-serif;}
.bc-side-red{background:rgba(200,16,46,0.15);color:#ff7070;}
.bc-side-blue{background:rgba(30,80,200,0.15);color:#70a0ff;}
.bc-type-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;font-family:'Kanit',sans-serif;}
.bc-type-tor{background:rgba(245,200,66,0.1);color:var(--gold);}
.bc-type-rong{background:rgba(80,160,255,0.1);color:#80c8ff;}
.bc-amount{font-family:'Kanit',sans-serif;font-weight:900;font-size:16px;color:var(--gold);}

.bc-body{padding:0 12px 4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.bc-odds{font-size:11px;color:var(--muted);font-family:'Kanit',sans-serif;}
.bc-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;font-family:'Kanit',sans-serif;}
.bcs-waiting{background:rgba(245,200,66,0.1);color:var(--gold);}
.bcs-partial{background:rgba(100,200,100,0.12);color:#90e090;}
.bcs-full,.bcs-matched{background:rgba(34,197,94,0.15);color:var(--green);}
.bcs-won{background:rgba(34,197,94,0.2);color:#4ade80;}
.bcs-lost{background:rgba(200,80,80,0.15);color:#f87171;}
.bcs-cancelled{background:rgba(150,150,150,0.1);color:#aaa;}
.bc-time{font-size:10px;color:rgba(240,255,232,0.3);margin-left:auto;font-family:'Kanit',sans-serif;}

.bc-progress{padding:0 12px 6px;}
.bc-prog-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-family:'Kanit',sans-serif;margin-bottom:3px;}
.bc-prog-bar{height:4px;border-radius:999px;background:rgba(255,255,255,0.07);}
.bc-prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),#4ade80);transition:width .4s;}

.bc-join{
  padding:6px 12px 10px;
  background:rgba(245,200,66,0.03);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.bc-join-label{font-size:11px;color:var(--muted);font-family:'Kanit',sans-serif;white-space:nowrap;}
.bc-join-input{
  flex:1;min-width:60px;
  background:rgba(0,0,0,0.3);border:1px solid var(--border);
  border-radius:7px;padding:5px 8px;color:#fff;
  font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;
  outline:none;
}
.bc-join-input:focus{border-color:rgba(245,200,66,0.4);}
.bc-btn-max{
  padding:5px 8px;border-radius:7px;
  border:1px solid rgba(245,200,66,0.3);
  background:rgba(245,200,66,0.07);color:var(--gold);
  font-family:'Kanit',sans-serif;font-size:10px;font-weight:700;
}
.bc-btn-join{
  padding:5px 12px;border-radius:7px;border:none;
  background:linear-gradient(135deg,var(--green2),#15803d);
  color:#fff;font-family:'Kanit',sans-serif;font-size:11px;font-weight:700;
  box-shadow:0 2px 8px rgba(22,163,74,0.3);transition:all .15s;
}
.bc-btn-join:hover{transform:translateY(-1px);}
.bc-potential{
  font-size:10px;color:rgba(240,255,232,0.4);
  font-family:'Kanit',sans-serif;padding:0 12px 8px;
}

/* ── Bet Detail Overlay (Slide-up) ── */
.bd-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;
}
.bd-overlay.open{display:flex;}
.bd-sheet{
  background:linear-gradient(175deg,#0c1e0c,#060f06);
  border:1px solid rgba(245,200,66,0.2);
  border-radius:20px 20px 0 0;
  width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
  animation:slideUp .22s ease;
  padding-bottom:env(safe-area-inset-bottom,0);
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

.bd-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:#0c1e0c;z-index:1;
}
.bd-title{font-family:'Kanit',sans-serif;font-weight:900;font-size:15px;}
.bd-close{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,0.07);border:1px solid var(--border);
  color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;
}

/* Odds grid ใน detail */
.bd-section{padding:14px 18px 0;}
.bd-section-label{
  font-family:'Kanit',sans-serif;font-size:10px;font-weight:700;
  color:var(--muted);letter-spacing:.05em;margin-bottom:8px;
  text-transform:uppercase;
}
.bd-odds-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:14px;}
.bd-odds-opt{
  padding:7px 3px;border-radius:9px;cursor:pointer;text-align:center;
  border:1px solid var(--border);background:rgba(255,255,255,0.03);transition:all .15s;
}
.bd-odds-opt:hover{background:rgba(245,200,66,0.1);border-color:rgba(245,200,66,0.35);}
.bd-odds-opt.sel{background:rgba(245,200,66,0.18);border-color:rgba(245,200,66,0.65);}
.bd-odds-opt.sel-rong{background:rgba(80,160,255,0.15);border-color:rgba(80,160,255,0.55);}
.bd-odds-ratio{font-family:'Kanit',sans-serif;font-weight:900;font-size:13px;color:var(--gold);}
.bd-odds-desc{font-family:'Kanit',sans-serif;font-size:9px;color:var(--muted);margin-top:1px;}

/* Order book ใน detail */
.bd-ob-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.bd-ob-title{font-family:'Kanit',sans-serif;font-size:12px;font-weight:700;}
.bd-ob-count{font-size:11px;color:var(--muted);font-family:'Kanit',sans-serif;}
.bd-ob-list{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;}
.bd-ob-row{
  display:grid;grid-template-columns:1fr auto auto;
  align-items:center;gap:6px;
  background:rgba(0,0,0,0.2);border-radius:8px;
  padding:7px 10px;border:1px solid var(--border);
}
.bd-ob-nick{font-family:'Kanit',sans-serif;font-size:12px;font-weight:700;color:rgba(240,255,232,0.75);}
.bd-ob-amt{font-family:'Kanit',sans-serif;font-size:12px;font-weight:700;color:var(--gold);}
.bd-ob-rem{font-size:10px;color:var(--muted);font-family:'Kanit',sans-serif;text-align:right;}
.bd-ob-bar{grid-column:1/-1;height:3px;border-radius:999px;background:rgba(255,255,255,0.06);}
.bd-ob-fill{height:100%;border-radius:999px;background:var(--green);}
.bd-ob-empty{text-align:center;padding:20px;color:var(--muted);font-family:'Kanit',sans-serif;font-size:12px;}

/* Input section */
.bd-input-section{padding:12px 18px 20px;}
.bd-sep{height:1px;background:linear-gradient(90deg,transparent,rgba(245,200,66,0.2),transparent);margin:12px 0;}
.bd-qp{display:flex;gap:5px;margin-bottom:8px;}
.bd-qp button{
  flex:1;padding:8px 4px;border-radius:8px;
  border:1px solid var(--border);background:rgba(255,255,255,0.04);
  color:var(--muted);font-family:'Kanit',sans-serif;font-size:12px;font-weight:700;
  transition:all .15s;
}
.bd-qp button:hover{background:rgba(245,200,66,0.1);border-color:rgba(245,200,66,0.3);color:var(--gold);}
.bd-amt-input{
  width:100%;background:rgba(0,0,0,0.3);
  border:1px solid var(--border);border-radius:11px;
  padding:12px;color:#fff;
  font-family:'Kanit',sans-serif;font-size:22px;font-weight:700;text-align:center;
  outline:none;margin-bottom:6px;
}
.bd-amt-input:focus{border-color:rgba(245,200,66,0.5);}
.bd-preview{
  font-family:'Kanit',sans-serif;font-size:11px;color:var(--muted);
  text-align:center;min-height:16px;margin-bottom:10px;
}
.bd-submit{
  width:100%;padding:14px;border-radius:12px;border:none;
  font-family:'Kanit',sans-serif;font-weight:900;font-size:15px;
  cursor:pointer;transition:all .2s;
}
.bd-submit:hover{transform:translateY(-2px);filter:brightness(1.1);}
.bd-submit:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none;}
.bd-submit.red{background:linear-gradient(135deg,#e01535,var(--red));color:#fff;box-shadow:0 4px 20px rgba(200,16,46,0.4);}
.bd-submit.blue{background:linear-gradient(135deg,#2563eb,var(--blue));color:#fff;box-shadow:0 4px 20px rgba(30,80,200,0.4);}

/* Live player */
.live-player-wrap{
  background:#000;border-radius:12px;overflow:hidden;
  position:relative;padding-top:56.25%;margin-bottom:8px;
}
.live-player-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.live-badge{
  position:absolute;top:10px;left:10px;z-index:2;
  background:var(--red);color:#fff;
  font-family:'Kanit',sans-serif;font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:4px;letter-spacing:.05em;
  animation:pulse 1.5s infinite;
}
.no-stream-notice{
  text-align:center;padding:24px 16px;color:var(--muted);
  font-family:'Kanit',sans-serif;font-size:13px;
}

/* Misc */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(15,32,16,0.97);color:#fff;
  border:1px solid var(--border);border-radius:12px;
  padding:10px 20px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);z-index:999;
  opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1;}
.empty{
  text-align:center;padding:32px 16px;color:var(--muted);
  font-family:'Kanit',sans-serif;font-size:13px;
}
.login-notice{
  text-align:center;padding:24px 16px;color:var(--muted);
  font-family:'Kanit',sans-serif;font-size:13px;
}
.login-notice a{color:var(--gold);cursor:pointer;font-weight:700;}
.skeleton{

// ═══════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════
async function loadMatch() {
  const { data, error } = await sb.from('matches').select('*').eq('id', matchId).maybeSingle();
  if (error || !data) {
    document.getElementById('page-content').innerHTML =
      `<div class="empty">ไม่พบรายการแข่งขัน <a href="wuachon-schedule.html" style="color:var(--gold);">กลับ</a></div>`;
    return;
  }
  matchData = data;
  await loadBets();
  renderPage();
}

async function loadBets() {
  const { data } = await sb.from('bets').select('*').eq('match_id', matchId).order('created_at', { ascending:false });
  allBets = data || [];
}

// ═══════════════════════════════════════
// REALTIME
// ═══════════════════════════════════════
function subscribeRealtime() {
  sb.channel('match-rt-' + matchId)
    .on('postgres_changes', { event:'*', schema:'public', table:'bets', filter:`match_id=eq.${matchId}` }, async () => {
      await loadBets(); renderBetsList();
      if (document.getElementById('bd-overlay').classList.contains('open')) renderBdOrderBook();
    })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'matches', filter:`id=eq.${matchId}` }, async (payload) => {
      const oldStatus = normalizeStatus(matchData?.status);
      matchData = { ...matchData, ...payload.new };
      if (normalizeStatus(payload.new?.status) === 'live' && oldStatus !== 'live') autoRefundUnmatched();
      renderPage();
    })
    .subscribe(s => console.log('Match RT:', s));
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function normalizeStatus(raw) {
  const s = (raw||'').toLowerCase().trim();
  if (s==='live'||s==='กำลังแข่ง') return 'live';
  if (s==='done'||s==='จบแล้ว'||s==='finish') return 'done';
  return 'upcoming';
}

function formatDate(d) {
  if (!d) return '';
  try {
    const dt = new Date(d);
    const months = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    return `${dt.getDate()} ${months[dt.getMonth()+1]} ${dt.getFullYear()+543}`;
  } catch { return d; }
}

function calcProfit(amount, num, den) { return Math.floor(amount * den / num); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function buildTorOpts() {
  return Array.from({length:10},(_,i)=>{ const den=10-i; return {num:10,den,label:`10/${den}`}; });
}
function buildRongOpts() {
  return Array.from({length:10},(_,i)=>{ const num=i+1; return {num,den:10,label:`${num}/10`}; });
}

// ═══════════════════════════════════════
// AUTO REFUND
// ═══════════════════════════════════════
async function autoRefundUnmatched() {
  try {
    const { data } = await sb.from('bets').select('*').eq('match_id', matchId).eq('status','waiting').gt('remaining_amount',0);
    if (!data?.length) return;
    for (const bet of data) {
      const refund = Number(bet.remaining_amount||0);
      if (refund <= 0) continue;
      const { data: mem } = await sb.from('members').select('balance').eq('nick', bet.nick).maybeSingle();
      const newBal = (Number(mem?.balance)||0) + refund;
      await sb.from('members').update({ balance:newBal }).eq('nick', bet.nick);
      await sb.from('bets').update({ status:'cancelled', match_status:'timeout', remaining_amount:0 }).eq('id', bet.id);
      if (currentUser?.nick === bet.nick) {
        currentUser.balance = newBal; updateBalanceDisplay();
        showToast(`💰 คืนเงิน ${refund.toLocaleString()} ₭ เพราะยังไม่มีคู่จับครับ`);
      }
    }
  } catch(e) { console.error('autoRefund', e); }
}

// ═══════════════════════════════════════
// BUILD STREAM
// ═══════════════════════════════════════
function buildStreamEmbed(url) {
  if (!url) return '';
  let embedUrl = '', platform = '';
  try {
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/live\/)([a-zA-Z0-9_-]{11})/);
    if (yt) { embedUrl = `https://www.youtube.com/embed/${yt[1]}?autoplay=1&rel=0`; platform='youtube'; }
    if (!embedUrl && (url.includes('facebook.com')||url.includes('fb.'))) {
      embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false&autoplay=true&width=560`; platform='facebook';
    }
  } catch(_){}
  if (!embedUrl) return '';
  return `<div class="live-player-wrap">
    <span class="live-badge">LIVE</span>
    <iframe src="${embedUrl}" allow="autoplay;fullscreen" allowfullscreen></iframe>
  </div>
  <div style="text-align:center;padding:6px 12px;font-size:11px;color:var(--muted);">
    <a href="${url}" target="_blank" style="color:var(--gold);">▶ เปิดดูใน ${platform==='youtube'?'YouTube':'Facebook'}</a>
  </div>`;
}

// ═══════════════════════════════════════
// BETS LIST
// ═══════════════════════════════════════
function filterBets(f) {
  _betsFilter = f;
  ['all','waiting','matched'].forEach(k => {
    document.getElementById('filt-'+k)?.classList.toggle('active', k===f);
  });
  renderBetsList();
}

function renderBetsList() {
  const el      = document.getElementById('bets-list-area');
  const countEl = document.getElementById('bets-count');
  if (!el) return;

  const filtered = _betsFilter === 'all' ? allBets
    : _betsFilter === 'waiting' ? allBets.filter(b => ['waiting','partial'].includes(b.match_status||b.status))
    : allBets.filter(b => ['full','matched','won','lost'].includes(b.match_status||b.status));

  if (countEl) countEl.textContent = allBets.length;
  if (!filtered.length) { el.innerHTML = `<div class="empty">ยังไม่มีรายการเดิมพันครับ</div>`; return; }

  const isUpcoming = normalizeStatus(matchData?.status) === 'upcoming';

  el.innerHTML = filtered.map(b => {
    const isRed     = b.side === 'red';
    const sideName  = isRed ? (matchData?.name_a||'A') : (matchData?.name_b||'B');
    const sideLabel = sideName;

    const oddsStored = Number(b.odds||1);
    let betTypeLabel, oddsLabel;
    if (oddsStored > 1.01) {
      // รอง (ได้กำไรมากกว่า): odds = 10/num → num = 10/odds
      betTypeLabel = 'รอง';
      const num10 = Math.round(10 / oddsStored);
      const clampedNum = Math.max(1, Math.min(10, num10));
      oddsLabel = `${clampedNum}/10`;
    } else if (oddsStored < 0.99) {
      // ต่อ (ได้กำไรน้อยกว่า): odds = den/10 → den = odds × 10
      betTypeLabel = 'ต่อ';
      const den10 = Math.round(10 * oddsStored);
      const clampedDen = Math.max(1, Math.min(9, den10));
      oddsLabel = `10/${clampedDen}`;
    } else {
      // odds ≈ 1.0 (10/10) — แสดงตาม side
      betTypeLabel = 'ต่อ';
      oddsLabel = '10/10';
    }
    const fullOddsLabel = `${sideName} ${betTypeLabel} ${oddsLabel}`;

    const ms = b.match_status || b.status || 'waiting';
    const statusMap = {waiting:'⏳ รอจับคู่',partial:'🔄 จับบางส่วน',full:'✅ จับครบ',matched:'✅ จับแล้ว',won:'🏆 ชนะ',lost:'❌ แพ้',cancelled:'↩️ คืนเงิน'};
    const statusCls = {waiting:'bcs-waiting',partial:'bcs-partial',full:'bcs-full',matched:'bcs-matched',won:'bcs-won',lost:'bcs-lost',cancelled:'bcs-cancelled'};
    const pct = b.order_amount>0 ? Math.round((b.matched_amount/b.order_amount)*100) : 0;
    const remaining = Number(b.remaining_amount||0);
    const canJoin = isUpcoming && remaining>0 && ms==='waiting' && currentUser && b.nick!==currentUser.nick;
    const isOwnBet = currentUser?.nick === b.nick;
    const dt = b.created_at ? new Date(b.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) : '';
    const oddsVal = Number(b.odds||1);
    const potential = Math.floor(Number(b.amount||0) * oddsVal);

    return `<div class="bet-card ${isRed?'side-red':'side-blue'}${isOwnBet?' own-bet':''}">
      <div class="bc-head">
        <div class="bc-left">
          <span class="bc-nick">${isOwnBet?'🙋 ฉัน':('👤 '+b.nick)}</span>
          <span class="bc-side-badge ${isRed?'bc-side-red':'bc-side-blue'}">${fullOddsLabel}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;">
          <span class="bc-status ${statusCls[ms]||'bcs-waiting'}">${statusMap[ms]||ms}</span>
          <span class="bc-amount">${Number(b.amount).toLocaleString()} ₭</span>
        </div>
      </div>
      <div class="bc-body">
        <span class="bc-odds">
          ถ้าชนะ → กำไร
          <b style="color:#4ade80;">${potential.toLocaleString()} ₭</b>
          รับรวม
          <b style="color:var(--gold);">${(Number(b.amount)+potential).toLocaleString()} ₭</b>
        </span>
        ${dt?`<span class="bc-time">${dt}</span>`:''}
      </div>
      ${b.order_amount>0?`
      <div class="bc-progress">
        <div class="bc-prog-labels">
          <span>จับแล้ว ${Number(b.matched_amount||0).toLocaleString()} ₭</span>
          <span>เหลือ ${remaining.toLocaleString()} ₭ (${100-pct}%)</span>
        </div>
        <div class="bc-prog-bar"><div class="bc-prog-fill" style="width:${pct}%"></div></div>
      </div>`:''}
      ${canJoin?`
      <div class="bc-join">
        <span class="bc-join-label">วางเงินมาจับ (สูงสุด ${Math.floor(remaining*oddsVal).toLocaleString()} ₭):</span>
        <input type="number" id="join-amt-${b.id}" class="bc-join-input" placeholder="จำนวน"
          min="10" max="${Math.floor(remaining*oddsVal)}">
        <button class="bc-btn-max" onclick="_setJoinMax('${b.id}',${remaining},${oddsVal})">MAX</button>
        <button class="bc-btn-join" onclick="joinBet('${b.id}','${b.nick}','${b.side}',${oddsVal})">จับเดิมพัน</button>
      </div>
      <div class="bc-potential">
        💡 ฝั่งตรงข้ามจับได้สูงสุด
        <b style="color:var(--gold);">${Math.floor(remaining*oddsVal).toLocaleString()} ₭</b>
        · ถ้าชนะได้กำไร <b style="color:#4ade80;">${remaining.toLocaleString()} ₭</b>
      </div>`:''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// JOIN BET (เดิม)
// ═══════════════════════════════════════
async function joinBet(betId, oppNick, oppSide, oppOdds) {
  if (!currentUser) { showToast('กรุณาเข้าสู่ระบบก่อนครับ'); return; }
  if (currentUser.nick===oppNick) { showToast('ไม่สามารถรับคู่ของตัวเองได้ครับ'); return; }
  if (normalizeStatus(matchData?.status)!=='upcoming') { showToast('ปิดรับเดิมพันแล้วครับ'); return; }

  const { data:order } = await sb.from('bets').select('*').eq('id',betId).maybeSingle();
  if (!order||order.remaining_amount<=0) { showToast('รายการนี้จับคู่ครบแล้วครับ'); await loadBets(); renderBetsList(); return; }

  const inp = document.getElementById('join-amt-'+betId);
  // joinAmt = ยอดที่ฝั่งตรงข้ามวางมาจับ
  let joinAmt = parseFloat(inp?.value||0);
  if (!joinAmt||joinAmt<10) { showToast('กรุณากรอกจำนวนเงินที่ต้องการจับครับ'); return; }

  // oppMax = remaining * oppOdds (ยอดสูงสุดที่ฝั่งตรงข้ามวางได้)
  const oppMax = Math.floor(Number(order.remaining_amount) * oppOdds);
  joinAmt = Math.min(joinAmt, oppMax);

  if (currentUser.balance<joinAmt) { showToast(`ยอดไม่พอครับ (ต้องการ ${joinAmt.toLocaleString()} ₭)`); return; }

  // คำนวณ remaining ที่ลดลง = joinAmt / oppOdds (ยอดต้นทุนของเจ้าของตั๋วที่ถูกจับ)
  const ownerStakeUsed = Math.ceil(joinAmt / oppOdds);
  const mySide     = oppSide==='red' ? 'blue' : 'red';
  const mySideName = mySide==='red' ? (matchData?.name_a||'A') : (matchData?.name_b||'B');
  const txn = 'BET-'+Date.now()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();

  const newMatched   = Number(order.matched_amount||0) + ownerStakeUsed;
  const newRemaining = Math.max(0, Number(order.order_amount) - newMatched);

  await sb.from('bets').update({
    matched_amount:newMatched, remaining_amount:newRemaining,
    match_status:newRemaining<=0?'full':'partial',
    status:newRemaining<=0?'matched':'waiting',
  }).eq('id',betId);

  await sb.from('bets').insert({
    match_id:matchId, nick:currentUser.nick,
    side:mySide, side_name:mySideName,
    amount:joinAmt, odds:(1/oppOdds), txn,
    status:'matched', match_status:'full',
    order_amount:joinAmt, matched_amount:joinAmt, remaining_amount:0,
    parent_bet_id:betId,
  });

  const newBal = (currentUser.balance||0)-joinAmt;
  await sb.from('members').update({ balance:newBal }).eq('nick',currentUser.nick);
  currentUser.balance = newBal;
  sessionStorage.setItem('bw_user', JSON.stringify(currentUser));
  showToast(`✅ จับ ${joinAmt.toLocaleString()} ₭ สำเร็จ! ถ้าชนะได้ ${Math.floor(joinAmt/oppOdds).toLocaleString()} ₭`);
  await loadBets(); renderBetsList();
}

function _setJoinMax(betId, remaining, oddsVal) {
  // ยอดสูงสุดที่ฝั่งตรงข้ามต้องวาง = remaining * oddsVal
  const oppMax = Math.floor(remaining * (oddsVal||1));
  const myMax  = Math.min(oppMax, currentUser?.balance||0);
  const inp    = document.getElementById('join-amt-'+betId);
  if (inp) inp.value = myMax;
}

// ═══════════════════════════════════════
// BET DETAIL OVERLAY
// ═══════════════════════════════════════
function openBetDetail(side, type) {
  _bd.side = side; _bd.type = type;
  _bd.num  = selOdds[side][type].num;
  _bd.den  = selOdds[side][type].den;

  const sideName  = side==='a' ? (matchData?.name_a||'A') : (matchData?.name_b||'B');
  const typeLabel = type==='tor' ? '⚔️ ต่อ' : '🛡️ รอง';
  const colorStyle= side==='a' ? 'color:#ff7070' : 'color:#70a0ff';

  document.getElementById('bd-title').innerHTML =
    `<span style="${colorStyle};font-family:'Kanit',sans-serif;">${sideName}</span> <span style="color:var(--gold);">${typeLabel}</span>`;
  document.getElementById('bd-odds-label').textContent =
    type==='tor' ? '⚔️ เลือกราคาต่อ (10/10 → 10/1)' : '🛡️ เลือกราคารอง (1/10 → 10/10)';

  const btn = document.getElementById('bd-submit');
  btn.className = 'bd-submit '+(side==='a'?'red':'blue');
  btn.textContent = `วางเดิมพัน ${sideName}`;

  renderBdOddsGrid();
  renderBdOrderBook();

  const amtEl = document.getElementById('bd-amt');
  if (amtEl) amtEl.value = '';
  document.getElementById('bd-preview').innerHTML = '';

  // แสดง/ซ่อน login notice
  const loginNotice = document.getElementById('bd-login-notice');
  const betForm     = document.getElementById('bd-bet-form');
  if (currentUser) {
    if (loginNotice) loginNotice.style.display = 'none';
    if (betForm)     betForm.style.display = 'block';
  } else {
    if (loginNotice) loginNotice.style.display = 'block';
    if (betForm)     betForm.style.display = 'none';
  }

  document.getElementById('bd-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeBetDetail(e) {
  if (e && e.target!==document.getElementById('bd-overlay')) return;
  document.getElementById('bd-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderBdOddsGrid() {
  const { side, type, num, den } = _bd;
  const opts = type==='tor' ? buildTorOpts() : buildRongOpts();
  const grid = document.getElementById('bd-odds-grid');
  grid.innerHTML = opts.map(o => {
    // กำไร = amount × den/num  (สูตรเดียวกันทั้ง ต่อ และ รอง)
    const profit100 = calcProfit(100, o.num, o.den);
    const isSel = o.num===num && o.den===den;
    const cls   = isSel ? (type==='tor'?'sel':'sel-rong') : '';
    // desc: ลง 100 → กำไร X (ฝั่งตรงข้ามจับสูงสุด X)
    return `<div class="bd-odds-opt ${cls}" onclick="selectBdOdds(${o.num},${o.den})">
      <div class="bd-odds-ratio">${o.label}</div>
      <div class="bd-odds-desc">ลง100→กำไร${profit100}</div>
    </div>`;
  }).join('');
}

function selectBdOdds(num, den) {
  _bd.num = num; _bd.den = den;
  selOdds[_bd.side][_bd.type] = { num, den };
  // อัปเดต badge บน button
  const dispId = `disp-${_bd.side}-${_bd.type}`;
  const dispEl = document.getElementById(dispId);
  if (dispEl) dispEl.textContent = num+'/'+den;
  renderBdOddsGrid();
  renderBdOrderBook();
  calcBdPreview();
}

async function renderBdOrderBook() {
  const list    = document.getElementById('bd-ob-list');
  const countEl = document.getElementById('bd-ob-count');
  const sideKey = _bd.side==='a' ? 'red' : 'blue';
  if (!list) return;
  list.innerHTML = '<div class="bd-ob-empty">⏳ กำลังโหลด...</div>';
  try {
    const { data } = await sb.from('bets')
      .select('nick,amount,order_amount,matched_amount,remaining_amount,odds')
      .eq('match_id', matchId).eq('side', sideKey)
      .eq('status','waiting').gt('remaining_amount',0)
      .order('created_at',{ascending:true}).limit(20);
    if (!data?.length) {
      list.innerHTML = '<div class="bd-ob-empty">ยังไม่มีรายการรอจับคู่ครับ</div>';
      if (countEl) countEl.textContent = '0 รายการ';
      return;
    }
    if (countEl) countEl.textContent = data.length+' รายการ';
    list.innerHTML = data.map(b => {
      const pct = b.order_amount>0 ? Math.round((b.matched_amount/b.order_amount)*100) : 0;
      return `<div class="bd-ob-row">
        <div class="bd-ob-nick">👤 ${b.nick}</div>
        <div class="bd-ob-amt">${Number(b.amount).toLocaleString()} ₭</div>
        <div class="bd-ob-rem">เหลือ ${Number(b.remaining_amount).toLocaleString()} ₭</div>
        <div class="bd-ob-bar"><div class="bd-ob-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  } catch { list.innerHTML = '<div class="bd-ob-empty">โหลดไม่สำเร็จครับ</div>'; }
}

function setBdAmt(val) {
  const el = document.getElementById('bd-amt');
  if (el) { el.value = val; calcBdPreview(); }
}

function calcBdPreview() {
  const amount = parseFloat(document.getElementById('bd-amt')?.value)||0;
  const prev   = document.getElementById('bd-preview');
  if (!prev) return;
  if (!amount) { prev.innerHTML=''; return; }
  const { num, den, type } = _bd;
  // กำไร = amount × den/num (ทั้ง ต่อ และ รอง)
  const profit    = calcProfit(amount, num, den);
  const total     = amount + profit;
  // จุดสูงสุดที่ฝั่งตรงข้ามจะมาจับ = profit นั่นเอง
  const oppMax    = profit;
  const typeLabel = type === 'tor' ? 'ต่อ' : 'รอง';
  const oppLabel  = type === 'tor' ? 'ฝั่งรองจับได้สูงสุด' : 'ฝั่งต่อจับได้สูงสุด';

  prev.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:3px;">
      <div>ราคา <b style="color:var(--gold);">${num}/${den}</b>
        &nbsp;·&nbsp; วาง <b style="color:#fff;">${amount.toLocaleString()} ₭</b></div>
      <div style="color:rgba(240,255,232,0.5);font-size:10px;">${oppLabel}: <b style="color:var(--gold);">${oppMax.toLocaleString()} ₭</b></div>
      <div>ถ้าชนะ → กำไร <b style="color:#4ade80;">+${profit.toLocaleString()} ₭</b>
        &nbsp;รับรวม <b style="color:var(--gold);">${total.toLocaleString()} ₭</b></div>
    </div>`;
}

async function submitBetDetail() {
  if (!currentUser) { showToast('กรุณาเข้าสู่ระบบก่อนครับ'); return; }
  if (normalizeStatus(matchData?.status)!=='upcoming') { showToast('ปิดรับเดิมพันแล้วครับ'); return; }
  const amount = parseFloat(document.getElementById('bd-amt')?.value);
  if (!amount||amount<10) { showToast('ขั้นต่ำ 10 ₭ครับ'); return; }
  if (currentUser.balance<amount) { showToast('ยอดไม่พอครับ'); return; }

  const { side, type, num, den } = _bd;
  const sideKey  = side==='a' ? 'red' : 'blue';
  const sideName = side==='a' ? (matchData?.name_a||'A') : (matchData?.name_b||'B');
  const odds     = den/num;
  const emoji    = type==='tor' ? '⚔️' : '🛡️';
  const btn = document.getElementById('bd-submit');
  if (btn) { btn.disabled=true; btn.textContent='⏳ กำลังส่ง...'; }

  const txn = 'BET-'+Date.now()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();
  const { error } = await sb.from('bets').insert({
    match_id:matchId, nick:currentUser.nick,
    side:sideKey, side_name:sideName,
    amount, odds, txn, status:'waiting', match_status:'waiting',
    order_amount:amount, matched_amount:0, remaining_amount:amount,
    expires_at:new Date(Date.now()+2*60*60*1000).toISOString(),
  });

  if (btn) { btn.disabled=false; btn.textContent=`วางเดิมพัน ${sideName}`; }
  if (error) { showToast('เกิดข้อผิดพลาด: '+error.message); return; }

  const newBal = (currentUser.balance||0)-amount;
  await sb.from('members').update({ balance:newBal }).eq('nick',currentUser.nick);
  currentUser.balance = newBal;
  sessionStorage.setItem('bw_user', JSON.stringify(currentUser));
  updateBalanceDisplay();

  showToast(`✅ ${emoji} ${sideName} ราคา ${num}/${den} จำนวน ${amount.toLocaleString()} ₭`);
  document.getElementById('bd-amt').value = '';
  document.getElementById('bd-preview').innerHTML = '';
  renderBdOrderBook();
  await loadBets(); renderBetsList();
}
</script>
